# nixpacks.toml
# Ensures opencv-python-headless wins over opencv-python (GUI) that
# ultralytics pulls in — which requires libxcb (X11) not available on Railway.
#
# Strategy: Let Nixpacks auto-detect Python/pip normally (do NOT override
# [phases.setup] nixPkgs — it replaces instead of merges, breaking Python).
# After the default install phase, force-reinstall the headless variant.

[phases.build]
cmds = [
  "/opt/venv/bin/pip install --force-reinstall --no-deps opencv-python-headless"
]
